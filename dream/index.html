<html>
    <head>
        <title>My Dream</title>
        <!-- Set width of page = device-width -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
        <script src="../assets/js/jquery-3.7.1.min.js"></script>
        <script src="../assets/js/common.js"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <link rel="stylesheet" type="text/css" href="../assets/css/common.css">
        <style>
          table {
            border-collapse: collapse; /* Collapses borders into a single line */
          }
          table, th, td {
            border: 1px solid black; /* 1px solid black border */
          }
          body {
            margin:0px;
          }
          .product-grid{
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px;
          }
          .product{
            border: 1px solid red;
            padding: 10px;
            text-align: center;
          }
          .product img{
            width: 100%;
            height: auto;
          }
        </style>
    </head>
    <body>
      <nav class="navbar navbar-expand-sm bg-light" id="topNav"></nav>
      <div class="product-grid">
        <div class="product">
          <img src="../assets/image/dream/aws.png">
          <p>Pass certificate</p>
        </div>
        <div class="product">
          <img src="../assets/image/dream/sa.jpg">
          <p>Solution Architect</p>
        </div>
        <div class="product">
          <img src="../assets/image/dream/korean.jpg">
          <p>Onsite</p>
        </div>
        <div class="product">
          <img src="../assets/image/dream/family.jpg">
          <p>Married</p>
        </div>
        <div class="product">
          <img src="../assets/image/dream/home.jpg">
          <p>Home</p>
        </div>
        <div class="product">
          <img src="../assets/image/dream/car.jpg">
          <p>Have a car</p>
        </div>
      </div>
        <h1> Keep your face always toward the sunshin and shadows will fall behind you</h1>
      <script src="./dream.js"></script>
    </body>
</html>
